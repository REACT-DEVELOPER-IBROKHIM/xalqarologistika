version: 1
applications:
  - appRoot: client
    frontend:
      phases:
        preBuild:
          commands:
            - nvm use 18
            - npm ci --cache .npm --prefer-offline
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
      cache:
        paths:
          - '.npm/**/*'
env:
  variables:
    VITE_API_URL: $VITE_API_URL
    VITE_EDENAI_API_KEY: $VITE_EDENAI_API_KEY
    VITE_CHAT_ID: $VITE_CHAT_ID
    VITE_BOT_ID: $VITE_BOT_ID
    GENERATE_SOURCEMAP: FALSE
